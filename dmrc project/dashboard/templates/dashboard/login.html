<!DOCTYPE html>
<html>
<head>
    <title>DMRC Login</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; display: flex;
               justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; width: 320px; }
        h2 { color: #003580; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box;
                border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #003580; color: white;
                 border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .error { color: red; font-size: 13px; }
        .logo { text-align: center; font-size: 24px; font-weight: bold; color: #e63946; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">🚇 DMRC</div>
    <h2>Track Layout Generator</h2>
    {% for message in messages %}
        <p class="error">{{ message }}</p>
    {% endfor %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
